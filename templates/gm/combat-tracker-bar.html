<nav class="encounters flexrow gfl5r" id="gfl5r_gm_combat_tracker_bar">
    <ul class="encounter">
        {{#each encounterTypeList}}
            <li class="encounter encounter-control" data-id="{{this}}">
                <i class="fa fas encounter-icon-{{this}}{{#ifCond this '==' ../encounterType}} active{{/ifCond}}" title="{{this}}"></i>
            </li>
        {{/each}}
    </ul>
    <ul class="prepared">
        {{#each prepared as |prepared charType|}}
            <li class="encounter prepared-control" data-id="{{charType}}">
                <i class="fa fas prepared-icon-{{prepared}} prepared-{{charType}}" title="{{prepared}} ({{charType}})"></i>
            </li>
        {{/each}}
    </ul>
</nav>
